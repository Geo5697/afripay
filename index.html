<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkFlow Africa — Plateforme de Travail en Ligne</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #F5C518;
            --gold-light: #FFD84D;
            --dark: #0A0A0F;
            --dark2: #12121A;
            --dark3: #1C1C28;
            --card: #1E1E2E;
            --border: rgba(245,197,24,0.18);
            --text: #E8E8F0;
            --muted: #7A7A9A;
            --green: #22C55E;
            --red: #EF4444;
            --blue: #3B82F6;
            --radius: 16px;
            --font-head: 'Syne', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ========= PAGES ========= */
        .page { display: none; min-height: 100vh; }
        .page.active { display: flex; flex-direction: column; }

        /* ========= BACKGROUND EFFECTS ========= */
        .bg-glow {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background:
                radial-gradient(ellipse 60% 40% at 20% 20%, rgba(245,197,24,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 50% 30% at 80% 80%, rgba(59,130,246,0.05) 0%, transparent 70%);
        }

        /* ========= NAV ========= */
        .nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 28px; border-bottom: 1px solid var(--border);
            background: rgba(10,10,15,0.9); backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 100;
        }
        .nav-logo { font-family: var(--font-head); font-size: 1.3rem; font-weight: 800; color: var(--gold); letter-spacing: -0.5px; }
        .nav-logo span { color: var(--text); }
        .nav-links { display: flex; gap: 8px; }
        .nav-btn {
            background: transparent; border: 1px solid var(--border); color: var(--muted);
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: var(--font-body);
            font-size: 0.85rem; transition: all 0.2s;
        }
        .nav-btn:hover, .nav-btn.active-nav { background: var(--gold); color: var(--dark); border-color: var(--gold); font-weight: 600; }
        .nav-balance { font-family: var(--font-head); font-weight: 700; color: var(--gold); font-size: 0.95rem; display: flex; align-items: center; gap: 6px; }

        /* ========= CONTENT ========= */
        .content { flex: 1; padding: 40px 20px; max-width: 520px; margin: 0 auto; width: 100%; position: relative; z-index: 1; }
        .content-wide { max-width: 900px; }

        /* ========= HEADINGS ========= */
        .page-title { font-family: var(--font-head); font-size: 2rem; font-weight: 800; margin-bottom: 6px; line-height: 1.1; }
        .page-title span { color: var(--gold); }
        .page-sub { color: var(--muted); font-size: 0.95rem; margin-bottom: 32px; }

        /* ========= CARD ========= */
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 28px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        /* ========= FORM ========= */
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; font-weight: 500; letter-spacing: 0.3px; }
        .form-input {
            width: 100%; background: var(--dark3); border: 1px solid var(--border);
            color: var(--text); padding: 14px 16px; border-radius: 10px;
            font-family: var(--font-body); font-size: 0.95rem; transition: all 0.2s; outline: none;
        }

        /* ========= BUTTONS ========= */
        .btn-primary {
            width: 100%; background: var(--gold); color: var(--dark); border: none;
            padding: 15px 24px; border-radius: 10px; font-family: var(--font-head);
            font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
        .btn-green { background: var(--green); color: white; border: none; padding: 9px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 10px 18px; border-radius: 8px; cursor: pointer; }

        /* ========= PAYMENT OPTIONS ========= */
        .payment-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 24px; }
        .payment-option {
            background: var(--dark3); border: 2px solid var(--border); border-radius: 12px;
            padding: 16px 8px; text-align: center; cursor: pointer; transition: all 0.2s;
        }
        .payment-option.selected { border-color: var(--gold); background: rgba(245,197,24,0.08); }
        .payment-option .amount { font-family: var(--font-head); font-size: 1rem; font-weight: 700; color: var(--gold); }

        /* ========= TASKS & TABLES ========= */
        .task-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 14px; display: flex; align-items: center; gap: 16px; }
        .task-card.done { border-color: var(--green); opacity: 0.8; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 20px; }
        .admin-table th { text-align: left; color: var(--muted); padding: 12px; border-bottom: 1px solid var(--border); }
        .admin-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* ========= TOAST ========= */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 14px 24px; border-radius: 10px; z-index: 9999; transition: transform 0.3s;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { border-color: var(--red); }

        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; }
        .badge-green { background: rgba(34,197,94,0.2); color: var(--green); }
    </style>
</head>
<body>

<div class="bg-glow"></div>
<div class="toast" id="toast"></div>

<div class="page active" id="page-inscription">
    <nav class="nav"><div class="nav-logo">Work<span>Flow</span> Africa</div></nav>
    <div class="content">
        <h2 class="page-title">Bienvenue sur <span>AfriPay</span></h2>
        <p class="page-sub">Créez votre compte pour commencer vos missions.</p>
        <div class="card">
            <div class="form-group"><label class="form-label">Nom & Prénoms</label><input class="form-input" type="text" id="nom" placeholder="Ex: Geoffroy B."></div>
            <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="email" placeholder="exemple@gmail.com"></div>
            <div class="form-group"><label class="form-label">Téléphone</label><input class="form-input" type="tel" id="tel" placeholder="97000000"></div>
            <button class="btn-primary" onclick="validerInscription()">Commencer</button>
        </div>
    </div>
</div>

<div class="page" id="page-paiement">
    <nav class="nav"><div class="nav-logo">Work<span>Flow</span></div></nav>
    <div class="content">
        <h2 class="page-title">Choisir mon <span>Dépôt</span></h2>
        <div class="payment-grid">
            <div class="payment-option" onclick="selectPayment(this, 5000)"><div class="amount">5.000 F</div></div>
            <div class="payment-option" onclick="selectPayment(this, 10000)"><div class="amount">10.000 F</div></div>
            <div class="payment-option" onclick="selectPayment(this, 25000)"><div class="amount">25.000 F</div></div>
            <div class="payment-option" onclick="selectPayment(this, 50000)"><div class="amount">50.000 F</div></div>
        </div>
        <div id="payment-detail" style="display:none; margin-bottom:20px;">
            <p>Dépôt: <span id="payment-amount-display" style="color:var(--gold)"></span></p>
            <p>Gains: <span id="payment-gains" style="color:var(--green)"></span></p>
        </div>
        <button class="btn-primary" id="btn-payer" disabled onclick="validerPaiement()">Confirmer le dépôt</button>
    </div>
</div>

<div class="page" id="page-taches">
    <nav class="nav">
        <div class="nav-logo">WF</div>
        <div class="nav-links">
            <button class="nav-btn active-nav" onclick="goTo('page-taches')">Tâches</button>
            <button class="nav-btn" onclick="goTo('page-solde')">Solde</button>
            <button class="nav-btn" onclick="goTo('page-profil')">Profil</button>
        </div>
        <div class="nav-balance">💰 <span id="nav-balance-display">0</span> F</div>
    </nav>
    <div class="content content-wide" id="tasks-container"></div>
</div>

<div class="page" id="page-solde">
    <nav class="nav"><div class="nav-logo">WF</div><div class="nav-links"><button class="nav-btn" onclick="goTo('page-taches')">Retour</button></div></nav>
    <div class="content">
        <div class="card" style="text-align:center;">
            <p style="color:var(--muted)">Solde actuel</p>
            <h2 id="solde-display" style="font-size:3rem; color:var(--gold); margin:10px 0;">0 F</h2>
            <p style="font-size:0.8rem; margin-bottom:20px;">Dépôt initial: <span id="stat-depot">0 F</span></p>
            <button class="btn-primary" onclick="goTo('page-retrait')">Demander un retrait</button>
        </div>
    </div>
</div>

<div class="page" id="page-retrait">
    <nav class="nav"><div class="nav-logo">Retrait</div><button class="nav-btn" onclick="goTo('page-solde')">Annuler</button></nav>
    <div class="content">
        <div class="card">
            <div class="form-group"><label class="form-label">Montant (Min 5.000 F)</label><input class="form-input" type="number" id="retrait-montant"></div>
            <div class="form-group"><label class="form-label">Numéro Mobile Money</label><input class="form-input" type="tel" placeholder="Numéro de réception"></div>
            <button class="btn-primary" onclick="showToast('Demande envoyée à l\'admin !', 'success');
