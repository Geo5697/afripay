<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AfriPay - Recharge</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="max-w-md mx-auto p-6">
        <h1 class="text-2xl font-bold mb-6">Compte de recharge</h1>
        
        <div class="bg-white p-4 rounded-xl shadow mb-4 border border-gray-200">
            <p class="font-bold">Recharge Standard</p>
            <p class="text-gray-500 mb-4">500 FCFA</p>
            <button onclick="lancerPaiement(500)" class="w-full bg-emerald-500 text-white py-3 rounded-lg font-bold">
                Accéder au tableau de bord
            </button>
        </div>

        <div class="bg-white p-4 rounded-xl shadow border border-gray-200">
            <p class="font-bold">Recharge Premium</p>
            <p class="text-gray-500 mb-4">1000 FCFA</p>
            <button onclick="lancerPaiement(1000)" class="w-full bg-emerald-500 text-white py-3 rounded-lg font-bold">
                Accéder au tableau de bord
            </button>
        </div>
    </div>

    <script src="https://cdn.fedapay.com/checkout.js?v=1.1.7"></script>
    <script>
        function lancerPaiement(montantChoisi) {
            FedaPay.init({
                public_key: 'pk_live_Mi5ZqXjL0zHi3k49Dbi7VlGX',
                transaction: {
                    amount: montantChoisi,
                    description: 'Achat de crédit AfriPay'
                }
            });
            FedaPay.open();
        }
    </script>
</body>
</html>
